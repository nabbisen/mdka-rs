name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        Please fill out the fields below as completely as possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short and clear description of the problem.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error messages
      description: Paste relevant logs, stack traces, or error messages.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: Project version / commit hash / release tag.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, target, and anything else relevant.
      placeholder: |
        OS:
        rustc:
        cargo:
        target:
